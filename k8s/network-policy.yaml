apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: allow-localstack-only

spec:
  podSelector:
    matchLabels:
      app: secure-app

  policyTypes:
    - Egress

  egress:
    - to:
        - ipBlock:
            cidr: 172.23.0.1/32

      ports:
        - protocol: TCP
          port: 4566