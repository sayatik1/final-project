apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: secure-app-role

rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: secure-app-rolebinding

subjects:
  - kind: ServiceAccount
    name: secure-app-sa

roleRef:
  kind: Role
  name: secure-app-role
  apiGroup: rbac.authorization.k8s.io